<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>題目抽籤機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --panel: #151515;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --accent3: #5bc4a0;
    --text: #f5f0e8;
    --muted: #666;
    --border: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 28px 20px 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .header { text-align: center; }
  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(1.8rem, 7vw, 2.8rem);
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }
  .header p { font-size: 0.78rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.06em; }

  /* Category tabs */
  .cat-tabs { display: flex; gap: 8px; width: 100%; }
  .cat-tab {
    flex: 1;
    padding: 9px 4px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-tab:hover { border-color: var(--muted); color: var(--text); }
  .cat-tab.active-基礎 { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,0.08); }
  .cat-tab.active-綜合 { border-color: var(--accent2); color: var(--accent2); background: rgba(224,90,43,0.08); }
  .cat-tab.active-學霸 { border-color: var(--accent3); color: var(--accent3); background: rgba(91,196,160,0.08); }
  .cat-tab:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Number display */
  .number-badge {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(3.2rem, 14vw, 5rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: 0.04em;
    user-select: none;
    min-height: 1.1em;
    display: flex;
    align-items: baseline;
    gap: 0.06em;
  }
  .number-badge .cat-part { font-size: 0.42em; opacity: 0.8; }
  .number-badge.rolling { color: var(--accent); text-shadow: 0 0 40px rgba(240,192,64,0.4); }
  .number-badge.locked-基礎 { color: var(--accent); text-shadow: 0 0 50px rgba(240,192,64,0.35); }
  .number-badge.locked-綜合 { color: var(--accent2); text-shadow: 0 0 50px rgba(224,90,43,0.35); }
  .number-badge.locked-學霸 { color: var(--accent3); text-shadow: 0 0 50px rgba(91,196,160,0.35); }

  /* Question card */
  .question-card {
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: border-color 0.3s;
  }
  .question-card.border-基礎 { border-color: rgba(240,192,64,0.45); }
  .question-card.border-綜合 { border-color: rgba(224,90,43,0.45); }
  .question-card.border-學霸 { border-color: rgba(91,196,160,0.45); }
  .question-text { font-size: 1.05rem; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .question-placeholder { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.06em; }

  /* Status */
  .status-badge {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 3px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  /* Progress dots */
  .progress-section { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .progress-group {}
  .progress-label { font-size: 0.65rem; letter-spacing: 0.08em; margin-bottom: 5px; }
  .progress-label.lbl-基礎 { color: var(--accent); }
  .progress-label.lbl-綜合 { color: var(--accent2); }
  .progress-label.lbl-學霸 { color: var(--accent3); }
  .progress-row { display: flex; flex-wrap: wrap; gap: 5px; }

  .dot {
    width: 24px; height: 24px;
    border-radius: 4px;
    background: var(--border);
    border: 1.5px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.52rem; color: var(--muted);
    transition: all 0.2s;
    font-family: 'Oswald', sans-serif; font-weight: 700;
  }
  .dot.current-基礎 { background: var(--accent); border-color: var(--accent); color: #000; transform: scale(1.2); box-shadow: 0 0 10px rgba(240,192,64,0.5); }
  .dot.current-綜合 { background: var(--accent2); border-color: var(--accent2); color: #fff; transform: scale(1.2); box-shadow: 0 0 10px rgba(224,90,43,0.5); }
  .dot.current-學霸 { background: var(--accent3); border-color: var(--accent3); color: #000; transform: scale(1.2); box-shadow: 0 0 10px rgba(91,196,160,0.5); }

  /* Buttons */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .btn {
    padding: 13px 8px; border: none; border-radius: 4px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s;
    position: relative; overflow: hidden;
  }
  .btn::after { content:''; position:absolute; inset:0; background:white; opacity:0; transition:opacity 0.1s; }
  .btn:active::after { opacity: 0.08; }
  .btn-start { background: var(--accent); color: #000; }
  .btn-start:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-stop { background: var(--accent2); color: #fff; }
  .btn-stop:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-answer { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-answer:hover { background: rgba(240,192,64,0.1); transform: translateY(-1px); }
  .btn-answer:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-clear { background: transparent; color: var(--muted); border: 2px solid var(--border); }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); transform: translateY(-1px); }
  .btn-clear:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 100;
    align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-card {
    background: var(--panel); border: 2px solid var(--accent);
    border-radius: 8px; padding: 28px 24px 22px;
    max-width: 440px; width: 100%; text-align: center;
    animation: slideUp 0.22s ease; position: relative;
  }
  .modal-card.border-綜合 { border-color: var(--accent2); }
  .modal-card.border-學霸 { border-color: var(--accent3); }
  @keyframes slideUp { from { transform: translateY(16px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .modal-title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 3px; }
  .modal-title.color-綜合 { color: var(--accent2); }
  .modal-title.color-學霸 { color: var(--accent3); }
  .modal-subtitle { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 16px; text-transform: uppercase; }
  .modal-image-area {
    width: 100%; aspect-ratio: 4/3;
    background: #1a1a1a; border: 2px dashed var(--border);
    border-radius: 6px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 14px;
  }
  .modal-image-area img { width:100%; height:100%; object-fit:contain; display:none; }
  .modal-placeholder { display:flex; flex-direction:column; align-items:center; gap:7px; color:var(--muted); }
  .modal-placeholder .icon { font-size: 2rem; opacity: 0.3; }
  .modal-placeholder .fname {
    font-family: monospace; font-size: 0.7rem;
    color: var(--accent); background: rgba(240,192,64,0.08);
    padding: 3px 8px; border-radius: 3px;
  }
  .modal-placeholder p { font-size: 0.72rem; }
  .modal-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer; transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-hint { font-size: 0.65rem; color: var(--muted); line-height: 1.7; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <h1>抽題機</h1>
    <p>基礎 35題 · 綜合 10題 · 學霸 5題</p>
  </div>

  <div class="cat-tabs">
    <button class="cat-tab active-基礎" id="tab-基礎" onclick="selectCategory('基礎')">⭐ 基礎</button>
    <button class="cat-tab" id="tab-綜合" onclick="selectCategory('綜合')">🔥 綜合</button>
    <button class="cat-tab" id="tab-學霸" onclick="selectCategory('學霸')">💎 學霸</button>
  </div>

  <div class="number-badge" id="numBadge">?</div>

  <div class="question-card" id="questionCard">
    <div class="question-placeholder" id="questionPlaceholder">選擇類別，按「開始」抽題</div>
    <div class="question-text" id="questionText" style="display:none"></div>
  </div>

  <div class="status-badge" id="statusBadge">等待開始</div>

  <div class="progress-section">
    <div class="progress-group">
      <div class="progress-label lbl-基礎">⭐ 基礎 1–35</div>
      <div class="progress-row" id="dots-基礎"></div>
    </div>
    <div class="progress-group">
      <div class="progress-label lbl-綜合">🔥 綜合 1–10</div>
      <div class="progress-row" id="dots-綜合"></div>
    </div>
    <div class="progress-group">
      <div class="progress-label lbl-學霸">💎 學霸 1–5</div>
      <div class="progress-row" id="dots-學霸"></div>
    </div>
  </div>

  <div class="btn-grid">
    <button class="btn btn-start" id="btnStart" onclick="startRoll()">▶ 開始</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopRoll()" disabled>■ 停止</button>
    <button class="btn btn-answer" id="btnAnswer" onclick="showAnswer()" disabled>🃏 解答</button>
    <button class="btn btn-clear" id="btnClear" onclick="clearCard()" disabled>✕ 清除</button>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">基礎 1</div>
    <div class="modal-subtitle">解答圖卡</div>
    <div class="modal-image-area">
      <img id="modalImg" src="" alt="解答圖卡">
      <div class="modal-placeholder" id="modalPlaceholder">
        <div class="icon">🖼️</div>
        <p>解答圖片</p>
        <div class="fname" id="modalFilename">基礎_01.jpg</div>
        <p style="font-size:0.62rem; opacity:0.5; margin-top:1px">請將圖片放於同目錄</p>
      </div>
    </div>
    <div class="modal-hint">
      命名格式：<code style="color:var(--accent)">基礎_01.jpg</code> · <code style="color:var(--accent2)">綜合_03.jpg</code> · <code style="color:var(--accent3)">學霸_02.jpg</code>
    </div>
  </div>
</div>

<script>
// ================================================================
//  ★ 題目資料 — 請將每題的題目文字填入對應位置 ★
// ================================================================
const QUESTIONS = {
  基礎: [
    "基礎第 1 題題目寫在這裡",   // 基礎1
    "基礎第 2 題題目寫在這裡",   // 基礎2
    "基礎第 3 題題目寫在這裡",   // 基礎3
    "基礎第 4 題題目寫在這裡",   // 基礎4
    "基礎第 5 題題目寫在這裡",   // 基礎5
    "基礎第 6 題題目寫在這裡",   // 基礎6
    "基礎第 7 題題目寫在這裡",   // 基礎7
    "基礎第 8 題題目寫在這裡",   // 基礎8
    "基礎第 9 題題目寫在這裡",   // 基礎9
    "基礎第 10 題題目寫在這裡",  // 基礎10
    "基礎第 11 題題目寫在這裡",  // 基礎11
    "基礎第 12 題題目寫在這裡",  // 基礎12
    "基礎第 13 題題目寫在這裡",  // 基礎13
    "基礎第 14 題題目寫在這裡",  // 基礎14
    "基礎第 15 題題目寫在這裡",  // 基礎15
    "基礎第 16 題題目寫在這裡",  // 基礎16
    "基礎第 17 題題目寫在這裡",  // 基礎17
    "基礎第 18 題題目寫在這裡",  // 基礎18
    "基礎第 19 題題目寫在這裡",  // 基礎19
    "基礎第 20 題題目寫在這裡",  // 基礎20
    "基礎第 21 題題目寫在這裡",  // 基礎21
    "基礎第 22 題題目寫在這裡",  // 基礎22
    "基礎第 23 題題目寫在這裡",  // 基礎23
    "基礎第 24 題題目寫在這裡",  // 基礎24
    "基礎第 25 題題目寫在這裡",  // 基礎25
    "基礎第 26 題題目寫在這裡",  // 基礎26
    "基礎第 27 題題目寫在這裡",  // 基礎27
    "基礎第 28 題題目寫在這裡",  // 基礎28
    "基礎第 29 題題目寫在這裡",  // 基礎29
    "基礎第 30 題題目寫在這裡",  // 基礎30
    "基礎第 31 題題目寫在這裡",  // 基礎31
    "基礎第 32 題題目寫在這裡",  // 基礎32
    "基礎第 33 題題目寫在這裡",  // 基礎33
    "基礎第 34 題題目寫在這裡",  // 基礎34
    "基礎第 35 題題目寫在這裡",  // 基礎35
  ],
  綜合: [
    "綜合第 1 題題目寫在這裡",   // 綜合1
    "綜合第 2 題題目寫在這裡",   // 綜合2
    "綜合第 3 題題目寫在這裡",   // 綜合3
    "綜合第 4 題題目寫在這裡",   // 綜合4
    "綜合第 5 題題目寫在這裡",   // 綜合5
    "綜合第 6 題題目寫在這裡",   // 綜合6
    "綜合第 7 題題目寫在這裡",   // 綜合7
    "綜合第 8 題題目寫在這裡",   // 綜合8
    "綜合第 9 題題目寫在這裡",   // 綜合9
    "綜合第 10 題題目寫在這裡",  // 綜合10
  ],
  學霸: [
    "學霸第 1 題題目寫在這裡",   // 學霸1
    "學霸第 2 題題目寫在這裡",   // 學霸2
    "學霸第 3 題題目寫在這裡",   // 學霸3
    "學霸第 4 題題目寫在這裡",   // 學霸4
    "學霸第 5 題題目寫在這裡",   // 學霸5
  ],
};
// ================================================================

const CAT_COUNTS = { 基礎: 35, 綜合: 10, 學霸: 5 };
let currentCat = '基礎';
let currentNum = null;
let rolling = false;
let rollTimer = null;
let stopped = false;

function buildDots() {
  ['基礎','綜合','學霸'].forEach(cat => {
    const row = document.getElementById(`dots-${cat}`);
    row.innerHTML = '';
    for (let i = 1; i <= CAT_COUNTS[cat]; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.textContent = i;
      d.id = `dot-${cat}-${i}`;
      row.appendChild(d);
    }
  });
}

function updateDots() {
  ['基礎','綜合','學霸'].forEach(cat => {
    for (let i = 1; i <= CAT_COUNTS[cat]; i++) {
      const d = document.getElementById(`dot-${cat}-${i}`);
      if (!d) continue;
      d.className = (stopped && cat === currentCat && i === currentNum)
        ? `dot current-${cat}` : 'dot';
    }
  });
}

function selectCategory(cat) {
  if (rolling) return;
  currentCat = cat;
  ['基礎','綜合','學霸'].forEach(c => {
    document.getElementById(`tab-${c}`).className =
      'cat-tab' + (c === cat ? ` active-${c}` : '');
  });
  if (!stopped) {
    document.getElementById('statusBadge').textContent =
      `已選：${cat}（共 ${CAT_COUNTS[cat]} 題）`;
  }
}

function startRoll() {
  rolling = true; stopped = false; currentNum = null;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnAnswer').disabled = true;
  document.getElementById('btnClear').disabled = true;
  document.getElementById('tab-基礎').disabled = true;
  document.getElementById('tab-綜合').disabled = true;
  document.getElementById('tab-學霸').disabled = true;

  const badge = document.getElementById('numBadge');
  badge.className = 'number-badge rolling';
  document.getElementById('questionCard').className = 'question-card';
  document.getElementById('questionPlaceholder').style.display = 'block';
  document.getElementById('questionPlaceholder').textContent = '抽題中...';
  document.getElementById('questionText').style.display = 'none';
  document.getElementById('statusBadge').textContent = '抽題中...';
  updateDots();

  rollTimer = setInterval(() => {
    const r = Math.floor(Math.random() * CAT_COUNTS[currentCat]) + 1;
    badge.innerHTML = `<span class="cat-part">${currentCat}</span>${r}`;
  }, 60);
}

function stopRoll() {
  if (!rolling) return;
  clearInterval(rollTimer);
  rolling = false; stopped = true;

  currentNum = Math.floor(Math.random() * CAT_COUNTS[currentCat]) + 1;

  const badge = document.getElementById('numBadge');
  badge.className = `number-badge locked-${currentCat}`;
  badge.innerHTML = `<span class="cat-part">${currentCat}</span>${currentNum}`;

  document.getElementById('questionPlaceholder').style.display = 'none';
  document.getElementById('questionText').style.display = 'block';
  document.getElementById('questionText').textContent = QUESTIONS[currentCat][currentNum - 1];
  document.getElementById('questionCard').className = `question-card border-${currentCat}`;
  document.getElementById('statusBadge').textContent = `${currentCat} ${currentNum} 題`;

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnAnswer').disabled = false;
  document.getElementById('btnClear').disabled = false;
  document.getElementById('tab-基礎').disabled = false;
  document.getElementById('tab-綜合').disabled = false;
  document.getElementById('tab-學霸').disabled = false;

  updateDots();
}

function showAnswer() {
  if (!stopped || currentNum === null) return;
  const padded = String(currentNum).padStart(2, '0');
  const filename = `${currentCat}_${padded}.jpg`;

  document.getElementById('modalTitle').textContent = `${currentCat} ${currentNum}`;
  document.getElementById('modalTitle').className = `modal-title color-${currentCat}`;
  document.getElementById('modalCard').className = `modal-card border-${currentCat}`;
  document.getElementById('modalFilename').textContent = filename;

  const img = document.getElementById('modalImg');
  const ph = document.getElementById('modalPlaceholder');
  img.style.display = 'none'; ph.style.display = 'flex';
  img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };
  img.src = filename;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function clearCard() {
  closeModal();
  stopped = false; currentNum = null;

  document.getElementById('numBadge').className = 'number-badge';
  document.getElementById('numBadge').textContent = '?';
  document.getElementById('questionCard').className = 'question-card';
  document.getElementById('questionPlaceholder').style.display = 'block';
  document.getElementById('questionPlaceholder').textContent = '選擇類別，按「開始」抽題';
  document.getElementById('questionText').style.display = 'none';
  document.getElementById('statusBadge').textContent = `已選：${currentCat}（共 ${CAT_COUNTS[currentCat]} 題）`;

  document.getElementById('btnAnswer').disabled = true;
  document.getElementById('btnClear').disabled = true;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  updateDots();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

buildDots();
selectCategory('基礎');
</script>
</body>
</html>
