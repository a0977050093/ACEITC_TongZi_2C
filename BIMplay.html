<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽題機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161e;
  --border: #1e1e2e;
  --accent: #7c6af7;
  --accent-glow: rgba(124,106,247,0.25);
  --gold: #f0c040;
  --gold-glow: rgba(240,192,64,0.2);
  --teal: #4ecdc4;
  --rose: #ff6b6b;
  --text: #e8e8f0;
  --muted: #555568;
  --muted2: #333344;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── BACKGROUND ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 10%, rgba(124,106,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(78,205,196,0.04) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,106,247,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ─── LAYOUT ─── */
.page {
  position: relative;
  z-index: 1;
  max-width: 660px;
  margin: 0 auto;
  padding: 40px 20px 100px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ─── HEADER ─── */
.header {
  text-align: center;
  padding-bottom: 8px;
}

.header-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0.8;
}

.header h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(3.5rem, 12vw, 6rem);
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 0.9;
  position: relative;
  display: inline-block;
}

.header h1 span {
  color: var(--accent);
  text-shadow: 0 0 40px var(--accent-glow);
}

.header-sub {
  margin-top: 10px;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  font-family: 'DM Mono', monospace;
}

.header-sub em {
  color: var(--teal);
  font-style: normal;
}

/* ─── POOL TOGGLE ─── */
.pool-info {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.pool-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.pool-count {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.8rem;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 0 20px var(--accent-glow);
}

.pool-breakdown {
  display: flex;
  gap: 14px;
}

.pool-item {
  text-align: center;
}

.pool-item-num {
  font-family: 'Bebas Neue', cursive;
  font-size: 1.3rem;
  line-height: 1;
}

.pool-item-lbl {
  font-size: 0.6rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
}

.pool-item.basic .pool-item-num { color: var(--gold); }
.pool-item.comp .pool-item-num { color: var(--rose); }
.pool-item.pro .pool-item-num { color: var(--teal); }

/* ─── 學霸 TOGGLE ─── */
.pro-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}

.pro-toggle-label {
  font-size: 0.75rem;
  color: var(--teal);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
}

.toggle-switch {
  width: 40px;
  height: 22px;
  background: var(--border);
  border-radius: 11px;
  position: relative;
  transition: background 0.25s;
  border: 1px solid var(--muted2);
}

.toggle-switch.on {
  background: var(--teal);
  border-color: var(--teal);
}

.toggle-knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 14px;
  height: 14px;
  background: var(--text);
  border-radius: 50%;
  transition: transform 0.25s;
}

.toggle-switch.on .toggle-knob {
  transform: translateX(18px);
  background: #0a0a0f;
}

/* ─── ROLL STAGE ─── */
#rollStage {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

#rollStage::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,106,247,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.roll-number {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(6rem, 20vw, 10rem);
  line-height: 1;
  color: var(--muted2);
  transition: color 0.2s, text-shadow 0.2s;
  letter-spacing: 0.05em;
  position: relative;
}

.roll-number.rolling {
  color: var(--accent);
  text-shadow: 0 0 60px var(--accent-glow), 0 0 120px var(--accent-glow);
  animation: flicker 0.06s infinite alternate;
}

.roll-number.locked {
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow), 0 0 80px var(--gold-glow);
  animation: none;
}

@keyframes flicker {
  from { opacity: 1; }
  to { opacity: 0.85; }
}

.roll-cat-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  padding: 3px 12px;
  border-radius: 20px;
  margin-bottom: 8px;
  border: 1px solid transparent;
  opacity: 0;
  transition: opacity 0.3s;
}

.roll-cat-badge.show { opacity: 1; }
.roll-cat-badge.cat-基礎 { color: var(--gold); border-color: rgba(240,192,64,0.3); background: rgba(240,192,64,0.06); }
.roll-cat-badge.cat-綜合 { color: var(--rose); border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.06); }
.roll-cat-badge.cat-學霸 { color: var(--teal); border-color: rgba(78,205,196,0.3); background: rgba(78,205,196,0.06); }

.roll-status {
  font-size: 0.7rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
  margin-top: 8px;
  min-height: 1.2em;
}

/* ─── BUTTONS ─── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn {
  padding: 14px 10px;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
  transform: none !important;
  filter: none !important;
}

.btn-roll {
  background: var(--accent);
  color: #fff;
  grid-column: 1 / -1;
  font-size: 1.05rem;
  box-shadow: 0 4px 24px rgba(124,106,247,0.3);
}

.btn-roll:not(:disabled):hover {
  filter: brightness(1.12);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(124,106,247,0.45);
}

.btn-stop {
  background: var(--rose);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,107,107,0.25);
}

.btn-stop:not(:disabled):hover {
  filter: brightness(1.1);
  transform: translateY(-2px);
}

.btn-again {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}

.btn-again:not(:disabled):hover {
  border-color: var(--muted);
  color: var(--text);
  transform: translateY(-1px);
}

/* ─── Q&A CARD ─── */
#qaSection {
  display: none;
  flex-direction: column;
  gap: 0;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
}

#qaSection.visible {
  display: flex;
  animation: slideDown 0.35s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

.qa-question {
  background: var(--card);
  padding: 28px 28px 24px;
  position: relative;
}

.qa-q-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.qa-q-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.qa-q-number {
  font-family: 'Bebas Neue', cursive;
  font-size: 3.5rem;
  line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold-glow);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}

.qa-q-cat {
  font-size: 0.65rem;
  display: inline-block;
  margin-bottom: 4px;
}

.qa-q-text {
  font-size: 1.05rem;
  line-height: 1.85;
  color: var(--text);
  font-weight: 400;
}

/* ─── ANSWER SECTION ─── */
.qa-answer-toggle {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0;
  cursor: pointer;
  transition: background 0.2s;
}

.qa-answer-toggle:hover { background: var(--border); }

.qa-toggle-btn {
  width: 100%;
  padding: 16px 28px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.08em;
}

.qa-toggle-btn .arrow {
  font-size: 0.7rem;
  transition: transform 0.25s;
  opacity: 0.6;
}

.qa-toggle-btn.open .arrow { transform: rotate(180deg); }

.qa-answer-body {
  display: none;
  background: var(--card);
  border-top: 1px solid var(--muted2);
  padding: 24px 28px 28px;
}

.qa-answer-body.open { display: block; animation: fadeIn 0.25s ease; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.qa-a-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.qa-a-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.answer-text {
  font-size: 0.95rem;
  line-height: 1.9;
  color: var(--text);
  white-space: pre-wrap;
}

.answer-placeholder {
  text-align: center;
  padding: 30px 0;
  color: var(--muted);
}

.answer-placeholder .icon {
  font-size: 2.5rem;
  display: block;
  margin-bottom: 10px;
  opacity: 0.3;
}

.answer-placeholder p {
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.answer-placeholder code {
  font-family: 'DM Mono', monospace;
  color: var(--teal);
  background: rgba(78,205,196,0.08);
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 0.7rem;
}

/* ─── PROGRESS ─── */
.progress-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}

.progress-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.progress-group { margin-bottom: 14px; }
.progress-group:last-child { margin-bottom: 0; }

.progress-group-label {
  font-size: 0.62rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
  margin-bottom: 7px;
}

.progress-group-label.lbl-基礎 { color: var(--gold); }
.progress-group-label.lbl-綜合 { color: var(--rose); }
.progress-group-label.lbl-學霸 { color: var(--teal); }

.dots-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.dot {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  background: var(--muted2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  transition: all 0.2s;
}

.dot.active-基礎 {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  transform: scale(1.25);
  box-shadow: 0 0 10px rgba(240,192,64,0.5);
}

.dot.active-綜合 {
  background: var(--rose);
  border-color: var(--rose);
  color: #fff;
  transform: scale(1.25);
  box-shadow: 0 0 10px rgba(255,107,107,0.5);
}

.dot.active-學霸 {
  background: var(--teal);
  border-color: var(--teal);
  color: #000;
  transform: scale(1.25);
  box-shadow: 0 0 10px rgba(78,205,196,0.5);
}

/* ─── BACK TO TOP ─── */
.back-top {
  position: fixed;
  bottom: 28px;
  right: 22px;
  z-index: 99;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(124,106,247,0.45);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}

.back-top.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.back-top:hover {
  filter: brightness(1.15);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(124,106,247,0.6);
}

.back-top svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: #fff;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ─── DIVIDER ─── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}
.section-divider::before,
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
</style>
</head>

<body>

<div class="page" id="topAnchor">

  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">Quiz Lottery System</div>
    <h1>抽<span>題</span>機</h1>
    <div class="header-sub">
      基礎 35題 ＋ 綜合 10題 合併抽題 &nbsp;·&nbsp; <em>💎 學霸</em> 可開啟加入
    </div>
  </div>

  <!-- POOL INFO -->
  <div class="pool-info">
    <div>
      <div class="pool-label">題庫總數</div>
      <div class="pool-count" id="poolTotal">45</div>
    </div>

    <div class="pool-breakdown">
      <div class="pool-item basic">
        <div class="pool-item-num">35</div>
        <div class="pool-item-lbl">基礎</div>
      </div>
      <div class="pool-item comp">
        <div class="pool-item-num">10</div>
        <div class="pool-item-lbl">綜合</div>
      </div>
      <div class="pool-item pro" id="proPoolItem" style="opacity:0.3">
        <div class="pool-item-num">5</div>
        <div class="pool-item-lbl">學霸</div>
      </div>
    </div>

    <label class="pro-toggle" id="proToggle">
      <div class="pro-toggle-label">學霸<br>模式</div>
      <div class="toggle-switch" id="toggleSwitch">
        <div class="toggle-knob"></div>
      </div>
    </label>
  </div>

  <!-- ROLL STAGE -->
  <div id="rollStage">
    <div class="roll-cat-badge" id="catBadge"></div>
    <div class="roll-number" id="rollNum">—</div>
    <div class="roll-status" id="rollStatus">點擊「開始抽題」</div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="btn btn-roll" id="btnRoll" onclick="startRoll()">▶ 開始抽題</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopRoll()" disabled>■ 停止</button>
    <button class="btn btn-again" id="btnAgain" onclick="resetAll()" disabled>↺ 重新抽</button>
  </div>

  <!-- Q&A SECTION -->
  <div class="section-divider" id="qaDivider" style="display:none">題目與解答</div>

  <div id="qaSection">
    <div class="qa-question">
      <div class="qa-q-label">QUESTION</div>
      <div class="qa-q-number" id="qaNum">—</div>
      <div class="qa-q-cat" id="qaCat"></div>
      <div class="qa-q-text" id="qaText"></div>
    </div>

    <div class="qa-answer-toggle">
      <button class="qa-toggle-btn" id="ansToggleBtn" onclick="toggleAnswer()">
        <span>🃏 顯示解答</span>
        <span class="arrow">▲</span>
      </button>
      <div class="qa-answer-body" id="ansBody">
        <div class="qa-a-label">ANSWER</div>
        <div class="answer-placeholder" id="ansPlaceholder">
          <span class="icon">🖼️</span>
          <p>解答圖片命名格式：</p>
          <p><code id="ansFilename">基礎_01.jpg</code></p>
          <p style="margin-top:6px; font-size:0.65rem; opacity:0.5">將圖片放於同目錄下即可自動顯示</p>
        </div>
        <img id="ansImg" src="" alt="" style="display:none; width:100%; border-radius:6px;">
        <div class="answer-text" id="ansText" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="section-divider">題號紀錄</div>

  <div class="progress-wrap">
    <div class="progress-title">已抽題號 &nbsp;/ 進度追蹤</div>

    <div class="progress-group">
      <div class="progress-group-label lbl-基礎">⭐ 基礎 1–35</div>
      <div class="dots-row" id="dots-基礎"></div>
    </div>

    <div class="progress-group">
      <div class="progress-group-label lbl-綜合">🔥 綜合 1–10</div>
      <div class="dots-row" id="dots-綜合"></div>
    </div>

    <div class="progress-group" id="proProgressGroup">
      <div class="progress-group-label lbl-學霸">💎 學霸 1–5</div>
      <div class="dots-row" id="dots-學霸"></div>
    </div>
  </div>

</div><!-- /page -->

<!-- BACK TO TOP -->
<button class="back-top" id="backTop" onclick="scrollToTop()" title="回到最上層">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>

<script>
/* ─── DATA ─── */
const QUESTIONS = {
  基礎: [
    "顧客不願意上門的原因有哪些？",
    "亞伯特莫拉賓教授說，一個訊息的傳達必須透過三個方面，請問是哪三個方面，又各佔多少比例？",
    "ISQM服務品質制度中，六個服務構面為何，其中顧客最直接感受的是哪三項服務構面？",
    "CSI神秘客服務稽核調查需要在哪五項基礎下進行最佳？",
    "何謂「服務管理」？",
    "BIM行為形象服務禮儀系統課程，共有哪八大單元？",
    "顧客服務五大做法中，形象層面包含？",
    "呈現表情三個技巧與關鍵為何？展現良好聲音的重要技巧是？",
    "可以呈現良好站姿，但又不會讓肩膀僵硬的呈現方法為何？有O型腿，男性和女性的最好建議站姿為何？",
    "女性基本站姿為何？",
    "良好指引或引導的手勢呈現方式為何？良好引導手勢齊其建議最高、最寬、最低之呈現範圍為何？",
    "陪同引導貴賓時，須走在貴賓的哪一側與哪一方？接待引導貴賓時，須走在貴賓的哪一側與哪一方？",

  學霸: [
    "ISQM國際服務品質制度管理中，顧客最直接感受的是哪三項服務構面，每個構面分別觀察重點為何？",

    "顧客要離開時，身為服務人員的我們，應如何歡送？請說明步驟流程技巧",

    "身為櫃檯總機人員，接聽電話同時，現場有顧客上前詢問問題時，該如何示意？"

const CAT_COUNTS = { 基礎: 35, 綜合: 10, 學霸: 5 };

/* ─── STATE ─── */
let proMode = false;
let rolling = false;
let rollTimer = null;
let lockedCat = null;
let lockedNum = null;
let answerOpen = false;
let currentRollingCat = null;
let currentRollingNum = null;

/* ─── INIT ─── */
buildDots();
updatePoolTotal();
document.getElementById('proProgressGroup').style.opacity = '0.3';

document.getElementById('proToggle').addEventListener('click', () => {
  if (rolling) return;
  proMode = !proMode;
  document.getElementById('toggleSwitch').classList.toggle('on', proMode);
  document.getElementById('proPoolItem').style.opacity = proMode ? '1' : '0.3';
  document.getElementById('proProgressGroup').style.opacity = proMode ? '1' : '0.3';
  updatePoolTotal();
});

function updatePoolTotal() {
  const total = 35 + 10 + (proMode ? 5 : 0);
  document.getElementById('poolTotal').textContent = total;
}

function buildDots() {
  ['基礎','綜合','學霸'].forEach(cat => {
    const row = document.getElementById(`dots-${cat}`);
    row.innerHTML = '';
    for (let i = 1; i <= CAT_COUNTS[cat]; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.textContent = i;
      d.id = `dot-${cat}-${i}`;
      row.appendChild(d);
    }
  });
}

function pickRandom() {
  // 決定類別比例
  const pool = [];
  for (let i = 1; i <= 35; i++) pool.push({ cat: '基礎', num: i });
  for (let i = 1; i <= 10; i++) pool.push({ cat: '綜合', num: i });
  if (proMode) for (let i = 1; i <= 5; i++) pool.push({ cat: '學霸', num: i });
  const pick = pool[Math.floor(Math.random() * pool.length)];
  return pick;
}

function startRoll() {
  if (rolling) return;
  rolling = true;
  lockedCat = null;
  lockedNum = null;
  answerOpen = false;

  // hide Q&A
  document.getElementById('qaSection').className = '';
  document.getElementById('qaSection').style.display = 'none';
  document.getElementById('qaDivider').style.display = 'none';
  document.getElementById('ansBody').className = 'qa-answer-body';
  document.getElementById('ansToggleBtn').className = 'qa-toggle-btn';

  // buttons
  document.getElementById('btnRoll').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnAgain').disabled = true;
  document.getElementById('proToggle').style.pointerEvents = 'none';
  document.getElementById('proToggle').style.opacity = '0.4';

  // reset dots
  updateDots(null, null);

  const numEl = document.getElementById('rollNum');
  const badge = document.getElementById('catBadge');
  numEl.className = 'roll-number rolling';
  document.getElementById('rollStatus').textContent = '抽題中…';

  rollTimer = setInterval(() => {
    const pick = pickRandom();
    currentRollingCat = pick.cat;
    currentRollingNum = pick.num;

    numEl.textContent = String(pick.num).padStart(2, '0');

    badge.textContent = pick.cat;
    badge.className = `roll-cat-badge show cat-${pick.cat}`;
  }, 60);
}

function stopRoll() {
  if (!rolling) return;
  clearInterval(rollTimer);
  rolling = false;

  // final pick
  const pick = pickRandom();
  lockedCat = pick.cat;
  lockedNum = pick.num;

  const numEl = document.getElementById('rollNum');
  numEl.className = 'roll-number locked';
  numEl.textContent = String(lockedNum).padStart(2, '0');

  document.getElementById('catBadge').textContent = lockedCat;
  document.getElementById('catBadge').className = `roll-cat-badge show cat-${lockedCat}`;
  document.getElementById('rollStatus').textContent = `${lockedCat} 第 ${lockedNum} 題`;

  // buttons
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnAgain').disabled = false;
  document.getElementById('proToggle').style.pointerEvents = '';
  document.getElementById('proToggle').style.opacity = '';

  // show Q&A
  showQA(lockedCat, lockedNum);

  // update dots
  updateDots(lockedCat, lockedNum);
}

function showQA(cat, num) {
  const q = QUESTIONS[cat][num - 1];
  const filename = `${cat}_${String(num).padStart(2,'0')}.jpg`;

  // cat badge colors
  const catColors = { 基礎: '#f0c040', 綜合: '#ff6b6b', 學霸: '#4ecdc4' };
  const catIcons = { 基礎: '⭐', 綜合: '🔥', 學霸: '💎' };

  document.getElementById('qaNum').textContent = String(num).padStart(2,'0');
  document.getElementById('qaNum').style.color = catColors[cat];

  document.getElementById('qaCat').innerHTML =
    `<span style="color:${catColors[cat]}">${catIcons[cat]} ${cat}</span>`;

  document.getElementById('qaText').textContent = q;

  // answer
  document.getElementById('ansFilename').textContent = filename;
  document.getElementById('ansPlaceholder').style.display = 'block';
  document.getElementById('ansImg').style.display = 'none';
  document.getElementById('ansImg').src = '';
  document.getElementById('ansText').style.display = 'none';

  // Load image
  const img = document.getElementById('ansImg');
  img.onload = function() {
    document.getElementById('ansPlaceholder').style.display = 'none';
    img.style.display = 'block';
  };
  img.onerror = function() {
    document.getElementById('ansPlaceholder').style.display = 'block';
    img.style.display = 'none';
  };
  img.src = filename;

  // show section
  document.getElementById('qaDivider').style.display = 'flex';
  const qaSection = document.getElementById('qaSection');
  qaSection.style.display = 'flex';
  requestAnimationFrame(() => {
    qaSection.className = 'visible';
    // smooth scroll to it
    setTimeout(() => {
      qaSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  });
}

function toggleAnswer() {
  answerOpen = !answerOpen;
  const body = document.getElementById('ansBody');
  const btn = document.getElementById('ansToggleBtn');
  body.className = 'qa-answer-body' + (answerOpen ? ' open' : '');
  btn.className = 'qa-toggle-btn' + (answerOpen ? ' open' : '');
}

function resetAll() {
  lockedCat = null;
  lockedNum = null;
  answerOpen = false;

  document.getElementById('rollNum').className = 'roll-number';
  document.getElementById('rollNum').textContent = '—';
  document.getElementById('catBadge').className = 'roll-cat-badge';
  document.getElementById('rollStatus').textContent = '點擊「開始抽題」';

  document.getElementById('btnRoll').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnAgain').disabled = true;

  document.getElementById('qaSection').className = '';
  document.getElementById('qaSection').style.display = 'none';
  document.getElementById('qaDivider').style.display = 'none';
  document.getElementById('ansBody').className = 'qa-answer-body';
  document.getElementById('ansToggleBtn').className = 'qa-toggle-btn';

  updateDots(null, null);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateDots(cat, num) {
  ['基礎','綜合','學霸'].forEach(c => {
    for (let i = 1; i <= CAT_COUNTS[c]; i++) {
      const d = document.getElementById(`dot-${c}-${i}`);
      if (!d) continue;
      d.className = (cat === c && num === i) ? `dot active-${c}` : 'dot';
    }
  });
}

/* ─── BACK TO TOP ─── */
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backTop');
  if (window.scrollY > 200) {
    btn.classList.add('show');
  } else {
    btn.classList.remove('show');
  }
});

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
